services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - path: apps/web/.env.local
        required: false          # copy from .env.example if missing
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - web_next:/app/apps/web/.next
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: apps/agent
      dockerfile: Dockerfile
      target: runner
    ports:
      - "8000:8000"
    env_file:
      - path: apps/agent/.env
        required: false          # copy from .env.example if missing
    volumes:
      - ./apps/agent/app:/app/app
      - ./apps/agent/data:/app/data
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agent:
    build:
      context: apps/agent
      dockerfile: Dockerfile
      target: runner
    env_file:
      - path: apps/agent/.env
        required: false          # copy from .env.example if missing
    volumes:
      - ./apps/agent/app:/app/app
    command: python -m app.agent.worker start
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  web_next:
  web_node_modules:
  web_app_node_modules:
