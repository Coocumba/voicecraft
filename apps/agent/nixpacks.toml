providers = ["python"]

[phases.setup]
# Pin Python and pull uv from nixpkgs so the version is reproducible
# and independent of whatever uv version nixpacks would choose by default.
nixPkgs = ["python311", "uv"]

[phases.install]
# uv sync --frozen respects uv.lock exactly — equivalent to
# pnpm install --frozen-lockfile for Python dependency pinning.
cmds = ["uv sync --frozen"]

[start]
# $PORT is provided by Railway; uvicorn must bind to 0.0.0.0 to be
# accessible through the Railway ingress proxy.
cmd = "uv run uvicorn app.api.main:app --host 0.0.0.0 --port $PORT"
