[build]
builder = "dockerfile"
# Railway Root Directory must be set to "apps/agent"
dockerfilePath = "Dockerfile"

[deploy]
# LiveKit worker — long-running process, no HTTP server
startCommand = "python -m src.agent.worker start"
# No health check — worker has no HTTP endpoint
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
